<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Série D — Agent v1.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div id="sideMenu" class="side-menu">
    <div class="menu-header">
      <span>Configurations</span>
      <button onclick="toggleMenu()" class="close-btn">×</button>
    </div>
    <div class="menu-content">
      <button class="menu-item" onclick="showTokens()">🔑 Configurer les Jetons</button>
      <button class="menu-item" onclick="showLogs()">📊 Voir les Logs</button>
      <button class="menu-item" onclick="showTools()">🛠️ Pilotage Vercel</button>
      <hr>
      <p style="font-size: 12px; color: #888; padding: 10px;">Samsung A05 - Agent v1.0</p>
    </div>
  </div>

  <header class="ds-header">
    <div class="ds-icon" onclick="toggleMenu()">☰</div>
    <div class="ds-header-title">Série D</div>
    <div class="ds-icon">+</div>
  </header>

  <main class="ds-main">
    <div class="ds-logo">D</div>
    <h1 class="ds-welcome">Comment puis-je vous aider ?</h1>
  </main>

  <footer class="ds-footer">
    <div class="ds-input-wrapper">
      <textarea id="projectDescription" class="ds-textarea" placeholder="Décrivez votre projet..." rows="1"></textarea>
      <div class="ds-actions">
        <div class="ds-left-btns">
          <button class="ds-pill-btn active">Réflexion</button>
          <button class="ds-pill-btn">Recherche</button>
        </div>
        <button id="deployBtn" class="ds-send-btn">🚀</button>
      </div>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
    }
  </script>
</body>
</html>
