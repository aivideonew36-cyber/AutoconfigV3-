<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Série D — Agent v1.0</title>
  
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div id="sideMenu" class="side-menu">
    <div class="menu-header">
      <span>Configurations</span>
      <button onclick="toggleMenu()" class="close-btn">×</button>
    </div>
    <div class="menu-content">
      <button class="menu-item" onclick="showTokens()">🔑 Configurer les Jetons</button>
      <button class="menu-item" onclick="showLogs()">📊 Voir les Logs</button>
      <button class="menu-item" onclick="showTools()">🛠️ Pilotage Vercel</button>
      <hr>
      <p style="font-size: 12px; color: #888; padding: 10px;">Samsung A05 - Agent v1.0</p>
    </div>
  </div>

  <header class="ds-header">
    <div class="ds-icon" onclick="toggleMenu()">☰</div>
    <div class="ds-header-title">Série D</div>
    <div class="ds-icon">+</div>
  </header>

  <main class="ds-main" id="chatContainer">
    <div id="brainConfig" style="background: #1e293b; color: white; padding: 15px; border-radius: 12px; margin: 15px; border: 1px solid #3b82f6;">
        <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 13px;">🧠 CERVEAU (API GROQ)</label>
        <div style="display: flex; gap: 8px;">
            <input type="password" id="groqInput" placeholder="Coller gsk_ ici..." 
                   style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; font-size: 14px;">
            <button onclick="saveGroqKey()" style="background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold;">OK</button>
        </div>
        <p id="groqStatus" style="font-size: 11px; margin-top: 8px; color: #94a3b8;">Statut : En attente...</p>
    </div>

    <div class="ds-logo" id="welcomeLogo">D</div>
    <h1 class="ds-welcome" id="welcomeText">Comment puis-je vous aider ?</h1>
  </main>

  <footer class="ds-footer">
    <div class="ds-input-wrapper">
      <textarea id="projectDescription" class="ds-textarea" placeholder="Dis 'Bonjour' pour commencer..." rows="1"></textarea>
      <div class="ds-actions">
        <div class="ds-left-btns">
          <button class="ds-pill-btn active">Réflexion</button>
          <button class="ds-pill-btn">Pilotage</button>
        </div>
        <button id="deployBtn" class="ds-send-btn">🚀</button>
      </div>
    </div>
  </footer>

  <script>
    window.saveGroqKey = () => {
        const key = document.getElementById('groqInput').value.trim();
        const status = document.getElementById('groqStatus');
        if (key.startsWith('gsk_')) {
            localStorage.setItem('sd_groq', key);
            status.innerText = "✅ Cerveau Opérationnel";
            status.style.color = "#4ade80";
            alert("🧠 Groq activé ! Ton pilote est prêt.");
        } else {
            alert("Erreur : La clé doit commencer par gsk_");
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('sd_groq');
        if (saved) {
            document.getElementById('groqInput').value = saved;
            document.getElementById('groqStatus').innerText = "✅ Cerveau Opérationnel";
            document.getElementById('groqStatus').style.color = "#4ade80";
        }
    });

    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
    }
  </script>
  
  <script type="module" src="app.js"></script>
</body>
</html>
